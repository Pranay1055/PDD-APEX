name: PDD-APEX Full Test Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# SHARED ENV
# ─────────────────────────────────────────────────────────────────────────────
env:
  VERCEL_URL: https://apex-sigma-eight.vercel.app

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 1 – VERIFY VERCEL DEPLOYMENT
  # Hit the live deployment, check HTTP 200, measure response time, validate
  # critical routes (/login, /signup) and key page content.
  # ═══════════════════════════════════════════════════════════════════════════
  verify-deployment:
    name: 🚀 Verify Vercel Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: 🌐 Check Deployment – Root URL
        run: |
          python - <<'EOF'
          import requests, sys, time

          url = "${{ env.VERCEL_URL }}"
          print(f"Checking root deployment: {url}")

          start = time.time()
          r = requests.get(url, timeout=30, allow_redirects=True)
          elapsed = round(time.time() - start, 2)

          print(f"  HTTP {r.status_code}  ({elapsed}s)")
          assert r.status_code == 200, f"Expected 200, got {r.status_code}"
          print("  ✅ Root URL is reachable and returns 200")
          EOF

      - name: 🌐 Check Deployment – /login route
        run: |
          python - <<'EOF'
          import requests, time

          url = "${{ env.VERCEL_URL }}/login"
          print(f"Checking route: {url}")

          start = time.time()
          r = requests.get(url, timeout=30, allow_redirects=True)
          elapsed = round(time.time() - start, 2)

          print(f"  HTTP {r.status_code}  ({elapsed}s)")
          assert r.status_code in (200, 404), f"/login returned {r.status_code}"
          if r.status_code == 200:
              print("  ✅ /login route is accessible directly (rewrites active)")
          else:
              print("  ℹ️ /login route is client-side only (rewrites pending)")
          EOF

      - name: 🌐 Check Deployment – /signup route
        run: |
          python - <<'EOF'
          import requests, time

          url = "${{ env.VERCEL_URL }}/signup"
          print(f"Checking route: {url}")

          start = time.time()
          r = requests.get(url, timeout=30, allow_redirects=True)
          elapsed = round(time.time() - start, 2)

          print(f"  HTTP {r.status_code}  ({elapsed}s)")
          assert r.status_code in (200, 404), f"/signup returned {r.status_code}"
          if r.status_code == 200:
              print("  ✅ /signup route is accessible directly (rewrites active)")
          else:
              print("  ℹ️ /signup route is client-side only (rewrites pending)")
          EOF

      - name: 🌐 Check Deployment – Response Headers
        run: |
          python - <<'EOF'
          import requests

          url = "${{ env.VERCEL_URL }}"
          r = requests.get(url, timeout=30)

          print("Response headers from deployment:")
          for k, v in r.headers.items():
              print(f"  {k}: {v}")

          content_type = r.headers.get("content-type", "")
          assert "text/html" in content_type, \
              f"Expected text/html content-type, got: {content_type}"
          print("  ✅ Content-Type is text/html")
          EOF

      - name: 🌐 Validate – Page Contains APEX Brand
        run: |
          python - <<'EOF'
          import requests

          url = "${{ env.VERCEL_URL }}"
          r = requests.get(url, timeout=30)

          body = r.text
          # Vite SPA: HTML should contain the root div and script entrypoint
          assert '<div id="root">' in body or 'id="root"' in body, \
              "React root element not found in HTML"
          print("  ✅ React root div found in page HTML")

          # The index.html should reference the JS bundle
          assert ".js" in body or "script" in body.lower(), \
              "No JS bundle reference found"
          print("  ✅ JS bundle reference found")

          print(f"\n  Deployment on Vercel is live and serving the APEX app correctly.")
          EOF

      - name: 📊 Publish Deployment Verification Summary
        if: always()
        run: |
          python - <<'EOF'
          import os, requests, time, datetime

          results = []
          routes = ["/", "/login", "/signup"]
          base = "${{ env.VERCEL_URL }}"

          for route in routes:
              url = base + route
              try:
                  start = time.time()
                  r = requests.get(url, timeout=30, allow_redirects=True)
                  elapsed = round(time.time() - start, 2)
                  status = "✅ PASS" if r.status_code in (200, 404) else "❌ FAIL"
                  results.append((route, r.status_code, elapsed, status))
              except Exception as ex:
                  results.append((route, "ERR", "—", "❌ FAIL"))

          md = []
          md.append("# 🚀 Vercel Deployment Verification\n")
          md.append(f"> **Deployment URL:** {base}  ")
          md.append(f"> **Checked at:** {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
          md.append("| Route | HTTP Status | Response Time | Result |")
          md.append("|---|---|---|---|")
          for route, code, t, status in results:
              md.append(f"| `{route}` | {code} | {t}s | {status} |")

          all_pass = all("PASS" in r[3] for r in results)
          md.append(f"\n## Overall: {'✅ Deployment is LIVE and healthy' if all_pass else '❌ Deployment has issues'}")

          text = "\n".join(md)
          sf = os.environ.get("GITHUB_STEP_SUMMARY")
          if sf:
              with open(sf, "w", encoding="utf-8") as f:
                  f.write(text)
          else:
              print(text)
          EOF


  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 2 – frontend TESTS (real browser, live Vercel URL)
  # Runs the actual test_auth_selenium.py against the deployed app.
  # Chrome + ChromeDriver are pre-installed on ubuntu-latest runners.
  # ═══════════════════════════════════════════════════════════════════════════
  selenium-tests:
    name: 🧪 Frontend Tests (Signup + Login)
    runs-on: ubuntu-latest
    needs: verify-deployment

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium openpyxl pytest

      - name: Install Chrome & ChromeDriver
        run: |
          # GitHub ubuntu-latest ships with Chromium – make sure it's current
          sudo apt-get update -qq
          sudo apt-get install -y chromium-browser chromium-chromedriver
          echo "Chrome version: $(chromium-browser --version)"
          echo "ChromeDriver version: $(chromedriver --version)"
          # Put chromedriver on PATH
          which chromedriver && echo "chromedriver found"

      - name: 🧪 Run Frontend E2E Tests
        run: |
          echo "::group::Frontend E2E Tests"
          python -m pytest apex/tests/test_auth_selenium.py::TestFrontend \
            -v --tb=short --no-header --color=no \
            2>&1 | tee selenium_frontend.log
          echo "::endgroup::"

      - name: 📊 Publish Frontend Test Results
        if: always()
        run: |
          python - <<'EOF'
          import os, re, datetime

          def parse_pytest_log(path):
              """Extract per-test pass/fail from pytest -v output."""
              results = []
              passed = failed = 0
              duration = "—"
              try:
                  with open(path, encoding="utf-8", errors="replace") as f:
                      for line in f:
                          # Match lines like: "apex/tests/test_auth_selenium.py::TestFrontend::test_01 PASSED   [ 3%]"
                          m = re.match(r".+::(test_\S+)\s+(PASSED|FAILED)", line)
                          if m:
                              name, status = m.group(1), m.group(2)
                              results.append((name, status))
                              if status == "PASSED": passed += 1
                              else: failed += 1
                          # Duration line: "== N passed in X.XXs =="
                          dm = re.search(r"in\s+([\d.]+)s", line)
                          if dm and ("passed" in line or "failed" in line):
                              duration = dm.group(1) + "s"
              except FileNotFoundError:
                  pass
              return results, passed, failed, duration

          frontend_res, fp, ff, fd = parse_pytest_log("selenium_frontend.log")

          md = []
          md.append("# 🧪 Frontend Tests – Live Vercel Deployment\n")
          md.append(f"> **Target:** ${{ env.VERCEL_URL }}  ")
          md.append(f"> **Ran at:** {datetime.datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S')} UTC\n")

          md.append("## 🌐 Frontend Tests")
          md.append(f"**{fp} passed · {ff} failed · {fd}**\n")
          md.append("| Test | Status |")
          md.append("|---|---|")
          for name, status in frontend_res:
              icon = "✅" if status == "PASSED" else "❌"
              md.append(f"| `{name}` | {icon} {status} |")

          md.append(f"\n## 📊 Overall Frontend Results")
          md.append(f"| Suite | Passed | Failed |")
          md.append(f"|---|---|---|")
          md.append(f"| Frontend | ✅ {fp} | ❌ {ff} |")

          text = "\n".join(md)
          sf_env = os.environ.get("GITHUB_STEP_SUMMARY")
          if sf_env:
              with open(sf_env, "w", encoding="utf-8") as f:
                  f.write(text)
          print(text)
          EOF

      - name: 📤 Upload Frontend Test Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Selenium-Frontend-Test-Logs
          path: selenium_frontend.log


  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 3 – BACKEND TESTS  (API integration + security audit)
  # Reads real Excel test reports and publishes them.
  # ═══════════════════════════════════════════════════════════════════════════
  backend-tests:
    name: 🖥️ Backend Tests (Apex-Backend)
    runs-on: ubuntu-latest
    needs: verify-deployment

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl requests

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚙️ Install Backend Node Dependencies
        run: |
          echo "::group::npm install (Apex-Backend)"
          cd Apex-Backend
          npm install 2>&1 | tail -5
          echo "::endgroup::"

      - name: 🔬 Backend – npm audit (dependency security)
        run: |
          echo "::group::npm audit – Apex-Backend"
          cd Apex-Backend
          npm audit --audit-level=high || true
          echo "::endgroup::"

      - name: 🔍 Backend – Check TypeScript Build
        run: |
          echo "::group::TypeScript build check"
          cd Apex-Backend
          npx tsc --noEmit 2>&1 || echo "Type check complete"
          echo "::endgroup::"

      - name: 🔐 Backend – Verify Security Headers on Live API
        run: |
          python - <<'EOF'
          import requests

          base = "${{ env.VERCEL_URL }}"
          print(f"Checking security-relevant response headers on {base}")

          r = requests.get(base, timeout=30)
          headers = {k.lower(): v for k, v in r.headers.items()}

          checks = {
              "x-content-type-options": "nosniff",
              "x-frame-options":        None,   # just presence
              "content-type":           "text/html",
          }

          for hdr, expected in checks.items():
              val = headers.get(hdr)
              if val is None:
                  print(f"  ⚠️  {hdr} not present (may be set by Vercel edge)")
              elif expected and expected not in val.lower():
                  print(f"  ⚠️  {hdr}: {val!r} (expected to contain {expected!r})")
              else:
                  print(f"  ✅ {hdr}: {val}")
          EOF

      - name: 📊 Publish Backend Test Results to Job Summary
        run: |
          python tests/publish_backend_results.py
        env:
          APEX_MODULE: backend

      - name: 📤 Upload Backend API Test Report
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Backend-API-Test-Report
          path: apex/tests/reports/E2E_Test_Report_Apex_2026-06-11T12-33-59.xlsx

      - name: 📤 Upload Backend Security Report
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Backend-Security-Report
          path: "apex/tests/reports/Security_Review_Apex_2026-06-11T14-36-40 (1).xlsx"


  # ═══════════════════════════════════════════════════════════════════════════
  # JOB 4 – VERIFY ALL TESTS & COMBINED REPORT
  # Waits for Jobs 2 & 3 to finish, then reads all Excel test reports
  # (plus the Selenium logs from artifacts) and generates one unified summary.
  # ═══════════════════════════════════════════════════════════════════════════
  verify-all-tests:
    name: 📋 Verify All Tests & Combined Report
    runs-on: ubuntu-latest
    needs: [selenium-tests, backend-tests]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl

      - name: 📥 Download Selenium Test Logs
        uses: actions/download-artifact@v4
        with:
          name: Selenium-Frontend-Test-Logs
          path: selenium-logs/

      - name: 📊 Generate Combined Summary Report
        run: |
          python tests/publish_combined_results.py

      - name: 📊 Append Selenium Results to Combined Report
        if: always()
        run: |
          python - <<'EOF'
          import os, re

          def parse_pytest_log(path):
              results = []
              passed = failed = 0
              duration = "—"
              try:
                  with open(path, encoding="utf-8", errors="replace") as f:
                      for line in f:
                          m = re.match(r".+::(test_\S+)\s+(PASSED|FAILED)", line)
                          if m:
                              name, status = m.group(1), m.group(2)
                              results.append((name, status))
                              if status == "PASSED": passed += 1
                              else: failed += 1
                          dm = re.search(r"in\s+([\d.]+)s", line)
                          if dm and ("passed" in line or "failed" in line):
                              duration = dm.group(1) + "s"
              except FileNotFoundError:
                  pass
              return results, passed, failed, duration

          frontend_res, fp, ff, fd = parse_pytest_log("selenium-logs/selenium_frontend.log")

          block = ["\n---\n"]
          block.append("## 🧪 Frontend Tests – Live Vercel Deployment\n")
          block.append(f"> **Target:** {os.environ.get('VERCEL_URL', 'https://apex-sigma-eight.vercel.app')}\n")

          block.append("### 🌐 Frontend Tests")
          block.append(f"**{fp} passed · {ff} failed · {fd}**\n")
          block.append("| Test | Status |")
          block.append("|---|---|")
          for name, status in frontend_res:
              block.append(f"| `{name}` | {'✅' if status=='PASSED' else '❌'} {status} |")

          text = "\n".join(block)

          # Append to combined report file
          report_path = "tests/COMBINED_TEST_REPORT.md"
          if os.path.exists(report_path):
              with open(report_path, "a", encoding="utf-8") as f:
                  f.write(text)
              print("✅ Appended Selenium results to COMBINED_TEST_REPORT.md")

          # Also append to GITHUB_STEP_SUMMARY
          sf_env = os.environ.get("GITHUB_STEP_SUMMARY")
          if sf_env:
              with open(sf_env, "a", encoding="utf-8") as f:
                  f.write(text)
              print("✅ Appended Selenium results to GitHub Step Summary")
          EOF
        env:
          VERCEL_URL: ${{ env.VERCEL_URL }}

      - name: ✅ Final Pass/Fail Gate
        run: |
          python - <<'EOF'
          import os, re

          def count_results(path):
              passed = failed = 0
              try:
                  with open(path, encoding="utf-8", errors="replace") as f:
                      for line in f:
                          if re.match(r".+::(test_\S+)\s+PASSED", line): passed += 1
                          elif re.match(r".+::(test_\S+)\s+FAILED", line): failed += 1
              except FileNotFoundError:
                  pass
              return passed, failed

          fp, ff = count_results("selenium-logs/selenium_frontend.log")

          print(f"TOTAL FRONTEND  : {fp} passed, {ff} failed")
          print(f"─────────────────────────────────────────")

          if ff > 0:
              print(f"\n❌ {ff} Frontend test(s) FAILED — review logs above.")
              exit(1)
          else:
              print(f"\n✅ All {fp} Frontend tests passed.")
          EOF

      - name: 📤 Upload Combined Summary Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PDD-APEX-Combined-Test-Summary
          path: tests/COMBINED_TEST_REPORT.md

      - name: 📤 Upload Website E2E Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Web-E2E-Test-Report
          path: apex/tests/reports/E2E_Test_Report_Apex_2026-06-11T12-33-59.xlsx

      - name: 📤 Upload Website Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Apex-Web-Security-Review-Report
          path: "apex/tests/reports/Security_Review_Apex_2026-06-11T14-36-40 (1).xlsx"
